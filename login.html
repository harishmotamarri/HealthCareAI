<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MediEase</title>
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/landing.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>

<body class="auth-page">
    <!-- Premium Background Orbs -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <nav id="navbar" class="scrolled">
        <div class="container flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 font-bold"
                style="font-size: 1.2rem; text-decoration: none; color: inherit;">
                <img src="assets/img/images.jpg" alt="MediEase Logo" width="32" height="32" style="border-radius: 6px;">
                <div style="display: flex; flex-direction: column;">
                    <span>MediEase <span class="text-gradient"></span></span>
                    <span
                        style="font-size: 0.6rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; line-height: 1;">Don't
                        just ask, know</span>
                </div>
            </a>
            <div class="flex gap-4 items-center">
                <!-- Theme Toggle -->
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">
                    <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
                <a href="index.html" class="btn btn-outline" style="border:none;">Back to Home</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="card auth-card">
            <div class="auth-header text-center">
                <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 8px;">Welcome Back</h2>
                <p class="text-muted" style="margin-bottom: 24px;">Login to access your AI doctor</p>
                <!-- Notification area for errors/success -->
                <div id="auth-message" style="display: none;"></div>
            </div>
            <form id="login-form" class="flex flex-col gap-4">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="flex justify-between items-center" style="font-size: 0.85rem; padding: 4px 0;">
                    <label class="flex items-center gap-2" style="cursor: pointer;">
                        <input type="checkbox" style="accent-color: var(--primary-green);"> Remember me
                    </label>
                    <a href="#" class="text-gradient hover-underline"
                        style="text-decoration: none; font-weight: 500;">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-gradient"
                    style="width: 100%; margin-top: 8px; font-size: 1.05rem; padding: 12px;">Login</button>
            </form>
            <div class="auth-footer text-center" style="margin-top: 24px; font-size: 0.9rem;">
                <p class="text-muted">Don't have an account? <a href="signup.html" class="text-gradient"
                        style="text-decoration: none; font-weight: 600;">Sign up</a></p>
            </div>
        </div>
    </div>

    <!-- Supabase SDK & App Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-client.js"></script>
    <script src="assets/js/auth.js"></script>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;

        // Check for saved theme preference
        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>

</html>
